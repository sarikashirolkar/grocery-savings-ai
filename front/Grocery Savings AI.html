<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grocery Savings AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,16,400;0,16,500;0,16,600;1,16,400;1,16,500&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #ECEAE8; }
  * { box-sizing: border-box; }
  ::selection { background: #FFDBDA; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/app-data.js"></script>
<script type="text/babel" src="app/ledger-ui.jsx"></script>
<script type="text/babel" src="app/screen-buy.jsx"></script>
<script type="text/babel" src="app/screen-dashboard.jsx"></script>
<script type="text/babel" src="app/screen-receipts.jsx"></script>
<script type="text/babel" src="app/screen-recommendations.jsx"></script>
<script type="text/babel" src="app/screen-login.jsx"></script>

<script type="text/babel">
  const { TopBar, C } = window.LX;
  const AUTH_KEY = "grocery-ledger-auth";
  const NAV_KEY = "grocery-ledger-screen";

  function App() {
    const [authed, setAuthed] = React.useState(() => {
      try { return localStorage.getItem(AUTH_KEY) === "1"; } catch { return false; }
    });
    const [screen, setScreen] = React.useState(() => {
      try { return localStorage.getItem(NAV_KEY) || "Buy"; } catch { return "Buy"; }
    });

    const go = (s) => {
      setScreen(s);
      try { localStorage.setItem(NAV_KEY, s); } catch {}
      window.scrollTo({ top: 0 });
    };
    const login = () => { try { localStorage.setItem(AUTH_KEY, "1"); } catch {} setAuthed(true); };
    const signOut = () => { try { localStorage.removeItem(AUTH_KEY); } catch {} setAuthed(false); };

    if (!authed) return <window.ScreenLogin onLogin={login} />;

    const Screen = {
      Buy: window.ScreenBuy,
      Dashboard: window.ScreenDashboard,
      Receipts: window.ScreenReceipts,
      Recommendations: window.ScreenRecommendations,
    }[screen] || window.ScreenBuy;

    return (
      <div style={{ minHeight: "100vh", background: C.canvas }}>
        <TopBar nav={window.APP.nav} active={screen} onNav={go} onSignOut={signOut} />
        <div style={{ maxWidth: 1240, margin: "0 auto", padding: "0 28px" }}>
          <Screen />
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
